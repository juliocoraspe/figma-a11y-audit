name: Deploy GitHub Pages

# Builds the plugin (same npm run build used for Figma) and publishes a
# landing page + live demo of the real UI: site/index.html embeds the
# single-file dist/ui.html and plays the Figma sandbox role with mock data.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          cp dist/ui.html _site/plugin-ui.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
