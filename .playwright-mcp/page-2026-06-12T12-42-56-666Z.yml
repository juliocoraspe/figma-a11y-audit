        - heading "Six Tier-1 checks" [level=2] [ref=e12]
        - list [ref=e13]:
          - listitem [ref=e14]:
            - text: 01 · WCAG 1.4.3
            - strong [ref=e15]: Text contrast
            - text: Per-segment ratios, alpha blending, large-text thresholds, gradient/image warnings.
          - listitem [ref=e16]:
            - text: 02 · WCAG 1.4.11
            - strong [ref=e17]: Non-text contrast
            - text: Borders, icons and UI elements against their effective background.
          - listitem [ref=e18]:
            - text: 03 · WCAG 2.5.8
            - strong [ref=e19]: Tap target size
            - text: 24px AA minimum with spacing analysis against neighboring interactive targets.
          - listitem [ref=e20]:
            - text: 04 · WCAG 1.4.4
            - strong [ref=e21]: Text size
            - text: 12px recommended minimum, 10px hard floor, caption/legal exceptions.
          - listitem [ref=e22]:
            - text: 05 · WCAG 2.4.7
            - strong [ref=e23]: Focus state defined
            - text: Flags interactive component sets shipping Hover/Pressed/Disabled but no Focus.
          - listitem [ref=e24]:
            - text: 06 · WCAG 2.4.11
            - strong [ref=e25]: Focus visibility
            - text: Validates indicator thickness (≥2px) and contrast (≥3:1) against the surface.
